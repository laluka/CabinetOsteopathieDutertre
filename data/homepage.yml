########################## About ##############################
about:
  enable : true
  eyebrow : "Cabinet d’ostéopathie · Grenoble, quartier Vigny-Musset"
  title : "Votre ostéopathe à Grenoble"
  lead : "Bienvenue au cabinet d’ostéopathie d’Aurélie Dutertre. Installée au cœur du quartier Vigny-Musset à Grenoble, je vous accueille dans un cabinet moderne où chaque consultation bénéficie d’une prise en charge globale et personnalisée d’une heure."
  image : "images/homepage_img.JPG"
  storyTitle : "Un parcours au service de votre santé"
  story :
    - "Ostéopathe diplômée du Collège Ostéopathique Sutherland de Paris en 2010, kinésithérapeute du sport et ostéopathe depuis plus de 20 ans, j’ai développé une expertise reconnue dans la prise en charge des sportifs de haut niveau, des blessures musculo-squelettiques et de la prévention des traumatismes."
    - "Mon parcours m’a conduite à accompagner les plus grandes équipes nationales françaises. J’ai notamment exercé comme kinésithérapeute et ostéopathe auprès de l’Équipe de France d’escalade de 2011 à 2023, en intervenant sur les stages nationaux et les compétitions internationales. J’ai également travaillé auprès de l’Équipe de France de voile puis de l’Équipe de France de ski-alpinisme."
    - "Aujourd’hui encore, cette expérience de terrain nourrit ma pratique quotidienne et me permet de proposer des soins adaptés aussi bien aux sportifs qu’aux patients de tous âges."
  highlights :
    - icon : "ti-star"
      title : "Formatrice"
      text : "Parallèlement à mon activité clinique, je suis formatrice auprès des DEJEPS Escalade de Vallon-Pont-d’Arc et d’Aix-en-Provence (promotion 2025-2026), où j’enseigne l’anatomie fonctionnelle, la prévention des blessures et l’optimisation de la performance en escalade."
    - icon : "ti-book"
      title : "Autrice"
      text : "Je suis également l’autrice de l’ouvrage Blessures et traumatismes en escalade, publié aux éditions Glénat, devenu une référence dans le milieu avec plus de 4 000 exemplaires diffusés."
    - icon : "ti-heart"
      title : "Pour tous les publics"
      text : "Je prends en charge les bébés, les femmes enceintes, les enfants, les adultes, les seniors ainsi que les sportifs amateurs et professionnels."
  closing :
    quote : "Votre santé, votre sécurité et la qualité des soins restent au cœur de mon engagement."
    note : "Aurélie Dutertre est ostéopathe agréée, reconnue par l’État. Les consultations peuvent être prises en charge par la majorité des mutuelles."



